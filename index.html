<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #fff;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-container {
            margin-bottom: 30px;
        }

        label {
            display: inline-block;
            width: 150px;
            margin-bottom: 10px;
        }

        input {
            padding: 5px;
            margin-bottom: 10px;
            width: 200px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 20px;
            margin-right: 10px;
            margin-top: 10px;
            cursor: pointer;
            background-color: #e8e8e8;
            border: 1px solid #999;
            border-radius: 3px;
        }

        button:hover {
            background-color: #d8d8d8;
        }

        h2 {
            margin-top: 30px;
            margin-bottom: 15px;
        }

        table {
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table th,
        table td {
            border: 1px solid #000;
            padding: 8px 15px;
            text-align: left;
        }

        table th {
            background-color: #f0f0f0;
            font-weight: bold;
        }

        .info {
            margin-top: 20px;
            font-size: 14px;
        }

        .info-item {
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
    <h2>melakukan perubahan dan pull</h2>
    <div class="form-container">
        <div>
            <label for="nama">Nama:</label>
            <input type="text" id="nama"><br>

            <label for="tugas">Nilai Tugas:</label>
            <input type="number" id="tugas" min="0" max="100"><br>

            <label for="uts">Nilai UTS:</label>
            <input type="number" id="uts" min="0" max="100"><br>

            <label for="uas">Nilai UAS:</label>
            <input type="number" id="uas" min="0" max="100"><br>

            <label for="hadir">Kehadiran (maks 14):</label>
            <input type="number" id="hadir" min="0" max="14"><br>

            <label for="berubah">melakukan perubahan dan pull</label>

            <button onclick="hitungNilai()">Hitung & Simpan</button>
            <button onclick="resetForm()">Tampilkan Rekap</button>
        </div>
    </div>

</body>

</html>
